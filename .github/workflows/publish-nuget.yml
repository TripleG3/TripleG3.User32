name: Publish NuGet Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-nuget-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  SOLUTION_PATH: TripleG3.User32.slnx
  PROJECT_PATH: TripleG3.User32/TripleG3.User32.csproj
  PACKAGE_OUTPUT_PATH: artifacts/packages

jobs:
  publish:
    name: Build, pack, and publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Verify NuGet API key secret
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "The NUGET_API_KEY repository secret is required to publish to NuGet.org."
          }

      - name: Restore
        run: dotnet restore $env:SOLUTION_PATH

      - name: Build
        run: dotnet build $env:SOLUTION_PATH --configuration $env:CONFIGURATION --no-restore

      - name: Pack
        run: dotnet pack $env:PROJECT_PATH --configuration $env:CONFIGURATION --no-build --output $env:PACKAGE_OUTPUT_PATH /p:ContinuousIntegrationBuild=true

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ${{ env.PACKAGE_OUTPUT_PATH }}/*.nupkg
          if-no-files-found: error

      - name: Publish to NuGet.org
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          Get-ChildItem -Path $env:PACKAGE_OUTPUT_PATH -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
